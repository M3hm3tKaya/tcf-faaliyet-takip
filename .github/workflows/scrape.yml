name: TCF Faaliyet Güncelle

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        working-directory: backend
        run: python scraper.py

      - name: Copy data to frontend
        run: |
          mkdir -p frontend/data
          cp backend/data/faaliyetler.json frontend/data/faaliyetler.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/faaliyetler.json backend/data/faaliyetler.json
          git diff --staged --quiet || git commit -m "chore: faaliyetler güncellendi [bot]"
          git push
